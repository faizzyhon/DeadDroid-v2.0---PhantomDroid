name: DeadDroid CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip' # Speeds up subsequent runs

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jdk apktool adb socat nmap

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build if there are critical Python syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Allow warnings for style to keep the build green during development
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        # Note: If your tests require a running msfrpcd, 
        # you would need to initialize it here.
        pytest
